<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | CYRAX</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
    <div class="logo"><a href="index.html" style="text-decoration:none; color:black;">CYRAX</a></div>
</header>

<main>
   <div class="checkout-container">
    <div class="checkout-form">
        <h2>Datos de Envío</h2>
        <form id="form-envio">
            <input type="text" placeholder="Nombre Completo" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Dirección (Calle y Número)" required>
            <div class="form-row">
                <input type="text" placeholder="Ciudad" required>
                <input type="text" placeholder="Código Postal" required>
            </div>
            <select id="metodo-pago">
                <option value="transferencia">Transferencia Bancaria (10% OFF)</option>
                <option value="mercadopago">Mercado Pago / Tarjetas</option>
            </select>
        </form>
    </div>

    <div class="checkout-summary">
        <h2>Tu Pedido</h2>
        <div id="lista-checkout" class="checkout-list">
            </div>
        <hr>
        <div class="summary-totals">
            <p>Subtotal: <span id="checkout-subtotal">$0</span></p>
            <p>Envío: <span>Gratis</span></p>
            <p class="total-final">Total: <span id="checkout-total">$0</span></p>
        </div>
        <button class="btn-finalizar" id="finalizar-pedido">FINALIZAR COMPRA</button>
        <a href="index.html" class="btn-volver">Seguir Comprando</a>
    </div>
</div>
</main>

<script src="js/main.js"></script>
<script>


function renderCheckout() {
    const cart = JSON.parse(localStorage.getItem("carrito")) || [];
    const container = document.getElementById("lista-checkout");
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = "<p>Tu carrito está vacío</p>";
        return;
    }

    container.innerHTML = cart.map(item => {
        total += item.price;
        return `
            <div class="checkout-item">
                <img src="${item.image}" alt="${item.name}">
                <div>
                    <p><strong>${item.name}</strong></p>
                    <p>$${item.price.toLocaleString("es-AR")}</p>
                </div>
            </div>
        `;
    }).join('');

    document.getElementById("checkout-subtotal").innerText = "$" + total.toLocaleString("es-AR");
    document.getElementById("checkout-total").innerText = "$" + total.toLocaleString("es-AR");
}

renderCheckout();



    // Iniciar la vista del carrito al cargar la página
    document.addEventListener('DOMContentLoaded', displayCart);
</script>
</body>
</html>
